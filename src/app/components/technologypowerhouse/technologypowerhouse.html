<section class="py-12 md:py-16 lg:py-20 bg-white">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Heading -->
    <div class="text-center mb-10 md:mb-14 lg:mb-16">

      <p class="uppercase tracking-wider text-[#ff7a1a] font-semibold text-sm sm:text-base md:text-xl">
        Technology Powerhouse
      </p>

      <h2
        class="mt-3 text-2xl sm:text-3xl lg:text-4xl font-medium text-[#123b57] leading-snug max-w-4xl mx-auto">
        Geospatial AI Platforms for Water, Agriculture &
        Disaster Management
      </h2>

    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">

      @for(item of technologies; track item.title){

      <div>

        <p class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-gray-500 mb-3">
          {{item.number}}
        </p>

        <div
          class="technology-card border border-gray-200 rounded-md p-6 lg:p-8 min-h-[280px]
                 hover:bg-[#103E52] hover:text-white
                 transition-all duration-300 group">

          <i
            [class]="item.icon"
            class="text-4xl text-orange-500 mb-6 group-hover:text-white">
          </i>

          <h3
            class="text-xl sm:text-2xl font-semibold mb-4">
            {{item.title}}
          </h3>

          <p
            class="text-gray-600 group-hover:text-gray-100 leading-7 text-base">
            {{item.description}}
          </p>

        </div>

      </div>

      }

    </div>

  </div>

</section>
