<div class="bg-white py-10">

  <!-- Heading -->
  <h1
    class="text-center text-xl sm:text-2xl lg:text-3xl font-semibold text-amber-500 mb-8">
    KEY CLIENTS
  </h1>

  <!-- Client Logos -->
  <div
    class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10
           flex flex-wrap justify-center items-center gap-8">

    <img
      *ngFor="let logo of logos"
      [src]="logo"
      alt="Client Logo"
      class="h-10 sm:h-12 md:h-14 lg:h-16 object-contain
             transition-transform duration-300 hover:scale-110">

  </div>

  <!-- Statistics -->
  <div
    class="max-w-6xl mx-auto mt-12 lg:mt-16
           bg-white shadow-xl rounded-lg
           grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3
           gap-8 py-8 px-6">

    <div class="text-center">
      <h1 class="text-3xl lg:text-4xl font-bold text-[#114359]">
        25+
      </h1>
      <p class="text-base lg:text-lg mt-2">
        Large Scale Deployments
      </p>
    </div>

    <div class="text-center">
      <h1 class="text-3xl lg:text-4xl font-bold text-[#114359]">
        40+
      </h1>
      <p class="text-base lg:text-lg mt-2">
        Fortune 500 Deployments
      </p>
    </div>

    <div class="text-center">
      <h1 class="text-3xl lg:text-4xl font-bold text-[#114359]">
        25+
      </h1>
      <p class="text-base lg:text-lg mt-2">
        Awards and Recognitions
      </p>
    </div>

  </div>

</div>
