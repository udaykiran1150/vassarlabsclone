<div class="relative bg-[#103E52] text-white py-20 px-16 h-180 justify-center items-center">

    <div class="grid grid-cols-2 gap-16 items-center">


        <div>

            <p class="text-orange-400 text-xl mb-8">
                {{slides[current].title}}
            </p>

            <h1 class="text-4xl font-semibold mb-8">
                {{slides[current].heading}}
            </h1>

            <p class="text-lg leading-8 text-gray-200">
                {{slides[current].description}}
            </p>

        </div>


        <div>

            <img [src]="slides[current].image" class="rounded-lg shadow-lg w-full">

        </div>

    </div>

    <!-- Previous -->

    <button (click)="previous()" class="absolute left-5 top-1/2 -translate-y-1/2 text-4xl">

        ❮

    </button>

    <!-- Next -->

    <button (click)="next()" class="absolute right-5 top-1/2 -translate-y-1/2 text-4xl">

        ❯

    </button>

    <!-- Dots -->

    <div class="flex justify-center gap-3 mt-10">

        <button *ngFor="let slide of slides; let i=index" (click)="goTo(i)" class="w-3 h-3 rounded-full"
            [ngClass]="current==i ? 'bg-blue-500':'bg-gray-500'">
        </button>

    </div>

</div>
